apiVersion: apps/v1
kind: Deployment
metadata:
  name: netai-chatbot
  namespace: netai
  labels:
    app.kubernetes.io/name: netai-chatbot
    app.kubernetes.io/component: api
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: netai-chatbot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netai-chatbot
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: chatbot
          image: ghcr.io/anirudh/netai-chatbot:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: netai-chatbot-config
            - secretRef:
                name: netai-chatbot-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: netai-chatbot-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: netai-chatbot-data
  namespace: netai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: rook-cephfs
